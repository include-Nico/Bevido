<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B€V!D0 - Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="glass-container home-hub">
        <header class="home-header">
            <div>
                <h1 class="logo" style="font-size: 1.5rem; text-align: left; margin: 0;">B€V!<span>D0</span></h1>
                <h2 id="homeWelcome" style="font-size: 1.2rem; margin-top: 5px;">Ciao, Utente!</h2>
            </div>
            <button onclick="location.href='stats.html'" class="icon-btn" title="Storico Completo">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>
        </header>

        <div id="activeSessionCard" class="widget-card active-session-widget" style="display: none;">
            <div class="widget-header">
                <h3><i class="fa-solid fa-circle-dot" style="color: #00e676; animation: pulse 2s infinite;"></i> Serata in Corso</h3>
            </div>
            <h2 id="homeTimer" class="huge-text">0h 0m</h2>
            <p class="subtitle text-center">Tempo stimato al recupero</p>
            <button onclick="location.href='dashboard.html'" class="btn-primary" style="margin-top: 10px;">Apri Serata</button>
        </div>

        <div id="newSessionCard" class="widget-card">
            <button onclick="startNewSession()" class="btn-primary pulse-btn" style="padding: 25px; font-size: 1.2rem;">
                <i class="fa-solid fa-play" style="margin-right: 10px;"></i> Inizia Giornata
            </button>
        </div>

        <h3 class="section-title">Questa Settimana</h3>
        <div class="stats-grid-2">
            <div class="stat-box">
                <i class="fa-solid fa-martini-glass-citrus"></i>
                <h4 id="weekCount">0</h4>
                <span>Serate</span>
            </div>
            <div class="stat-box">
                <i class="fa-solid fa-chart-line"></i>
                <h4 id="weekMax">0.00</h4>
                <span>Max g/L</span>
            </div>
        </div>

        <h3 class="section-title" style="margin-top: 25px;">Il tuo Fisico</h3>
        
        <div id="profileView" class="widget-card profile-widget">
            <div class="profile-info">
                <div class="info-item"><i class="fa-solid fa-weight-scale"></i> <span id="dispWeight">-</span> kg</div>
                <div class="info-item"><i class="fa-solid fa-ruler-vertical"></i> <span id="dispHeight">-</span> cm</div>
                <div class="info-item"><i class="fa-solid fa-cake-candles"></i> <span id="dispAge">-</span> anni</div>
            </div>
            <button onclick="toggleEditMode()" class="btn-secondary" style="margin-top: 15px; padding: 12px;">
                <i class="fa-solid fa-pen"></i> Modifica Dati
            </button>
        </div>

        <div id="profileEdit" class="widget-card" style="display: none; border-color: var(--primary);">
            <div class="form-group" style="margin-top: 0;">
                <div class="row">
                    <div class="input-box">
                        <label>Peso (kg)</label>
                        <input type="number" id="editWeight">
                    </div>
                    <div class="input-box">
                        <label>Altezza (cm)</label>
                        <input type="number" id="editHeight">
                    </div>
                </div>
                <div class="row">
                    <div class="input-box">
                        <label>Data Nascita</label>
                        <input type="date" id="editDob">
                    </div>
                    <div class="input-box">
                        <label>Sesso</label>
                        <select id="editGender">
                            <option value="0.68">Uomo</option>
                            <option value="0.55">Donna</option>
                        </select>
                    </div>
                </div>
                <div class="row" style="margin-top: 10px;">
                    <button onclick="toggleEditMode()" class="btn-secondary" style="flex: 1;">Annulla</button>
                    <button onclick="saveProfile()" class="btn-primary" style="flex: 1; margin-top: 10px;">Salva</button>
                </div>
            </div>
        </div>

    </div>

    <script src="js/home.js"></script>
</body>
</html>
