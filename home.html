<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B€V!D0 - Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="home-body">

    <!-- ============================================
         MODAL: MODIFICA PROFILO
         ============================================ -->
    <div id="profileEditModal" class="modal-overlay" style="display:none; align-items:center;">
        <div class="glass-container modal-content">
            <h3 style="margin-bottom:15px; color:var(--primary);">
                <i class="fa-solid fa-pen"></i> Modifica Fisico
            </h3>
            <div class="form-group">
                <div class="row">
                    <div class="input-box">
                        <label>Peso (kg)</label>
                        <input type="number" id="editWeight">
                    </div>
                    <div class="input-box">
                        <label>Altezza (cm)</label>
                        <input type="number" id="editHeight">
                    </div>
                </div>
                <div class="row">
                    <div class="input-box">
                        <label>Data Nascita</label>
                        <input type="date" id="editDob">
                    </div>
                    <div class="input-box">
                        <label>Sesso</label>
                        <select id="editGender">
                            <option value="0.68">Uomo</option>
                            <option value="0.55">Donna</option>
                        </select>
                    </div>
                </div>
                <div class="row" style="margin-top:15px;">
                    <button onclick="toggleEditMode()" class="btn-secondary" style="flex:1;">Annulla</button>
                    <button onclick="saveProfile()" class="btn-primary" style="flex:1;">Salva</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
         MODAL: SALVA RICORDO
         ============================================ -->
    <div id="memoryModal" class="modal-overlay" style="display:none; align-items:center;">
        <div class="glass-container modal-content">
            <h3 style="margin-bottom:15px; color:var(--primary);">
                <i class="fa-solid fa-camera"></i> Salva Ricordo
            </h3>
            <div class="form-group">
                <div class="input-box">
                    <label>Titolo Bevuta</label>
                    <input type="text" id="memoryTitle" placeholder="Es. Compleanno di Marco">
                </div>
                <div class="input-box">
                    <label>Allega Foto</label>
                    <input type="file" id="memoryImage" accept="image/*" style="padding:10px;">
                </div>
                <div class="row" style="margin-top:15px;">
                    <button onclick="toggleMemoryModal()" class="btn-secondary" style="flex:1;">Annulla</button>
                    <button id="confirmSaveMemory" class="btn-primary" style="flex:1;">Salva</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
         MODAL: DETTAGLIO RICORDO
         ============================================ -->
    <div id="memoryDetailModal" class="modal-overlay" style="display:none; align-items:flex-end;">
        <div class="glass-container modal-content memory-detail-content">

            <!-- Foto a tutta larghezza -->
            <div class="memory-detail-img-wrap">
                <img id="detailImage" src="" alt="">
                <button onclick="closeMemoryDetail()" class="memory-detail-close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Titolo + data + badge BAC -->
            <div class="memory-detail-header">
                <div>
                    <h2 id="detailTitle" class="memory-detail-title"></h2>
                    <p id="detailDate"  class="memory-detail-date"></p>
                </div>
                <div id="detailBacBadge" class="memory-bac-badge">
                    <span id="detailBac">0.00</span>
                    <small>g/L</small>
                </div>
            </div>

            <!-- Lista drink consumati -->
            <div class="memory-detail-drinks">
                <h4>
                    <i class="fa-solid fa-martini-glass-citrus" style="color:var(--primary);"></i>
                    Drink consumati
                </h4>
                <div id="detailDrinkList" class="memory-drink-list"></div>
            </div>

            <!-- Elimina -->
            <button
                id="detailDeleteBtn"
                class="btn-secondary"
                style="margin-top:5px; border-color:var(--danger); color:var(--danger);"
            >
                <i class="fa-solid fa-trash-can"></i> Elimina ricordo
            </button>

        </div>
    </div>

    <!-- ============================================
         SCHERMATA PRINCIPALE HOME
         ============================================ -->
    <div class="glass-container home-hub">

        <header class="home-header">
            <div>
                <h1 class="logo" style="font-size:1.5rem; text-align:left; margin:0;">
                    B€V!<span>D0</span>
                </h1>
                <h2 id="homeWelcome" style="font-size:1.1rem; margin-top:2px;">Ciao, Utente!</h2>
            </div>
            <button onclick="location.href='stats.html'" class="icon-btn">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>
        </header>

        <div class="home-content-wrapper">

            <!-- Card sessione attiva -->
            <div id="activeSessionCard" class="widget-card active-session-widget" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                    <h3 style="font-size:0.8rem; color:var(--primary);">
                        <i class="fa-solid fa-circle-dot pulse"></i> LIVE
                    </h3>
                    <button
                        onclick="toggleMemoryModal()"
                        class="btn-danger-small"
                        style="padding:5px 10px; font-size:0.7rem;"
                    >
                        <i class="fa-solid fa-camera"></i> Salva Ricordo
                    </button>
                </div>
                <h2 id="homeTimer" class="huge-text">0h 0m</h2>
                <p class="subtitle text-center">Recupero stimato</p>
                <button
                    onclick="location.href='dashboard.html'"
                    class="btn-primary"
                    style="margin-top:5px; padding:12px;"
                >
                    Apri Bevuta
                </button>
            </div>

            <!-- Card nuova sessione -->
            <div id="newSessionCard" class="widget-card">
                <button
                    onclick="startNewSession()"
                    class="btn-primary pulse-btn"
                    style="padding:20px;"
                >
                    <i class="fa-solid fa-play"></i> Inizia Bevuta
                </button>
            </div>

            <!-- Grafico settimanale inline -->
            <h3 class="section-title">Questa Settimana</h3>
            <div class="widget-card" style="padding:12px 14px 8px;">
                <canvas id="weeklyChart" style="width:100%; height:110px;"></canvas>
            </div>

            <!-- Ricordi -->
            <h3 class="section-title">I tuoi Ricordi</h3>
            <div id="memoryGallery" class="memory-scroll-x"></div>

            <!-- Profilo fisico -->
            <h3 class="section-title">Il tuo Fisico</h3>
            <div class="widget-card profile-widget">
                <div class="profile-info">
                    <div class="info-item">
                        <i class="fa-solid fa-weight-scale"></i>
                        <span id="dispWeight">-</span> kg
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-ruler-vertical"></i>
                        <span id="dispHeight">-</span> cm
                    </div>
                    <div class="info-item">
                        <i class="fa-solid fa-cake-candles"></i>
                        <span id="dispAge">-</span> anni
                    </div>
                </div>
                <button
                    onclick="toggleEditMode()"
                    class="btn-secondary"
                    style="margin-top:10px; padding:10px;"
                >
                    <i class="fa-solid fa-pen"></i> Modifica
                </button>
            </div>

        </div>
    </div>

    <script src="js/home.js"></script>
</body>
</html>
