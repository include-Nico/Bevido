<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B€V!D0 - Onboarding</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header class="text-center">
            <h1 class="logo">B€V!<span>D0</span></h1>
            <p class="subtitle">Inserisci i tuoi dati per calcolare il tuo limite.</p>
        </header>

        <form id="onboardingForm" class="form-group">
            <div class="input-box">
                <label for="username">Nome Utente</label>
                <input type="text" id="username" placeholder="Come ti chiamano?" required>
            </div>
            
            <div class="row">
                <div class="input-box">
                    <label for="weight">Peso (kg)</label>
                    <input type="number" id="weight" placeholder="es. 75" required>
                </div>
                <div class="input-box">
                    <label for="height">Altezza (cm)</label>
                    <input type="number" id="height" placeholder="es. 180" required>
                </div>
            </div>

            <div class="row">
                <div class="input-box">
                    <label for="dob">Data di Nascita</label>
                    <input type="date" id="dob" required>
                </div>
                <div class="input-box">
                    <label for="gender">Sesso Biologico</label>
                    <select id="gender" required>
                        <option value="0.68">Uomo</option>
                        <option value="0.55">Donna</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-primary">Entra nel Party</button>
        </form>
    </div>

    <script src="js/onboarding.js"></script>
</body>
</html>
